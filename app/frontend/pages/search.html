<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ricerca aziende - Agente AI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="/static/app.js"></script>
</head>
<body id="app"></body>
<script>
  if (!requireAuth()) {}
  const content = `
    <section class="mb-8">
      <h2 class="text-4xl font-semibold text-slate-900">Trova aziende</h2>
      <p class="text-slate-500 mt-2">Inserisci la tua ricerca e salva i lead migliori.</p>
    </section>
    <section class="card p-6 mb-6">
      <form id="f" class="space-y-4">
        <input id="q" class="input text-lg" placeholder="Es. private jet companies" required />
        <div class="grid md:grid-cols-3 gap-3">
          <input id="country" class="input" placeholder="Paese (es. Italia)" />
          <input id="sector" class="input" placeholder="Settore (es. Aviazione)" />
          <input id="limit" class="input" type="number" min="1" max="50" value="10" />
        </div>
        <button class="btn btn-primary w-full md:w-auto text-base px-8 py-3">Cerca</button>
      </form>
      <p id="status" class="text-sm text-slate-600 mt-4 min-h-[1.25rem]"></p>
    </section>
    <section class="card overflow-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-600">
          <tr>
            <th class="text-left p-3">Azienda</th>
            <th class="text-left p-3">Paese</th>
            <th class="text-left p-3">Score</th>
            <th class="text-left p-3">Classificazione</th>
            <th class="text-left p-3">Azione</th>
          </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="5" class="p-8 text-center text-slate-500">Nessun risultato. Avvia una ricerca per iniziare.</td></tr></tbody>
      </table>
    </section>`;
  document.getElementById('app').innerHTML = appLayout('search', content);

  function badgeClass(v) {
    const t = (v || "").toUpperCase();
    if (t === "HIGH VALUE") return "badge-hot";
    if (t === "MEDIUM") return "badge-warm";
    return "badge-cold";
  }

  function showSaved(btn) {
    btn.disabled = true;
    btn.textContent = "Lead salvato";
    btn.className = "btn btn-ghost text-xs";
  }

  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    const status = document.getElementById('status');
    const rows = document.getElementById('rows');
    status.textContent = 'Ricerca in corso...';
    rows.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-slate-500">Ricerca in corso...</td></tr>';
    try {
      const data = await api('/search-global', {
        method: 'POST',
        body: JSON.stringify({
          query: document.getElementById('q').value,
          country: document.getElementById('country').value,
          sector: document.getElementById('sector').value,
          limit: Number(document.getElementById('limit').value || 10),
          min_confidence: 0.28
        })
      });
      const n = (data.results || []).length;
      status.textContent = `Abbiamo trovato ${n} aziende.`;
      if (!n) {
        rows.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-500">Nessuna azienda trovata. Prova una query diversa.</td></tr>';
      } else {
        rows.innerHTML = (data.results||[]).map(r => `
        <tr class="border-t border-slate-100">
          <td class="p-3 font-medium text-slate-800">${r.name}</td>
          <td class="p-3 text-slate-600">${r.country || "-"}</td>
          <td class="p-3 text-slate-700">${r.score ?? 0}</td>
          <td class="p-3"><span class="px-2 py-1 rounded text-xs ${badgeClass(r.classification)}">${r.classification || "LOW"}</span></td>
          <td class="p-3"><button class="btn btn-primary text-xs save-btn">Salva lead</button></td>
        </tr>`).join("");
        document.querySelectorAll('.save-btn').forEach((b) => b.addEventListener('click', () => showSaved(b)));
      }
    } catch (err) {
      status.textContent = 'Si è verificato un errore. Riprova.';
      rows.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-slate-500">Errore durante la ricerca.</td></tr>';
    }
  });
</script>
</html>
