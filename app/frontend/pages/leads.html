<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lead salvati - Agente AI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="/static/app.js"></script>
</head>
<body id="app"></body>
<script>
  if (!requireAuth()) {}
  const content = `
    <div class="card p-4 mb-4">
      <div class="grid md:grid-cols-4 gap-3">
        <input id="q" class="input" placeholder="Cerca per azienda/settore/paese" />
        <select id="t" class="input">
          <option value="">Tutti gli stati</option>
          <option>HOT</option><option>WARM</option><option>COLD</option>
        </select>
        <button id="applyFilter" class="btn btn-ghost">Applica filtri</button>
        <button id="onlyHigh" class="btn btn-primary">Solo HIGH VALUE</button>
      </div>
    </div>
    <div class="card overflow-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-800"><tr>
          <th class="text-left p-3">Azienda</th><th class="text-left p-3">Paese</th><th class="text-left p-3">Score</th><th class="text-left p-3">Stato</th><th class="text-left p-3">Contatto</th><th class="text-left p-3">Azioni</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>`;
  document.getElementById('app').innerHTML = appLayout('leads', content);

  async function load(onlyHigh = false) {
    const q = encodeURIComponent((document.getElementById('q')?.value || '').trim());
    const t = encodeURIComponent((document.getElementById('t')?.value || '').trim());
    const endpoint = onlyHigh ? '/high-value-leads?page=1&page_size=100' : `/leads?page=1&page_size=100&q=${q}&temperature=${t}`;
    const leads = await api(endpoint);
    document.getElementById('rows').innerHTML = (leads||[]).map(l => `
      <tr class="border-t border-slate-800">
        <td class="p-3">${l.company_name}</td>
        <td class="p-3">${l.country}</td>
        <td class="p-3">${l.score}</td>
        <td class="p-3"><span class="px-2 py-1 rounded text-xs ${temperatureBadge(l.temperature)}">${l.temperature}</span></td>
        <td class="p-3">${l.contact_email || "-"}<br>${l.contact_phone || ""}</td>
        <td class="p-3">
          <div class="flex gap-2">
            <a href="/app/company?id=${l.id}" class="btn btn-ghost text-xs">Dettaglio</a>
            <button class="btn btn-ghost text-xs" onclick="setTemp(${l.id},'HOT')">HOT</button>
            <button class="btn btn-ghost text-xs" onclick="setTemp(${l.id},'WARM')">WARM</button>
            <button class="btn btn-ghost text-xs" onclick="setTemp(${l.id},'COLD')">COLD</button>
          </div>
        </td>
      </tr>
    `).join("");
  }

  async function setTemp(id, t) {
    try {
      await api(`/leads/${id}/temperature`, { method: 'PATCH', body: JSON.stringify({ temperature: t }) });
      await load();
    } catch (e) { alert(e.message); }
  }
  window.setTemp = setTemp;
  document.getElementById('applyFilter').addEventListener('click', () => load(false));
  document.getElementById('onlyHigh').addEventListener('click', () => load(true));
  load(false);
</script>
</html>
