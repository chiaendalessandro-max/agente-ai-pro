<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Agente AI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="/static/app.js"></script>
</head>
<body id="app"></body>
<script>
  if (!requireAuth()) {}
  (async function(){
    try {
      const kpi = await api('/kpi');
      const html = `
        <section class="mb-8">
          <h2 class="text-3xl font-semibold text-slate-900">Dashboard</h2>
          <p class="text-slate-500 mt-1">Panoramica rapida del tuo lavoro.</p>
        </section>

        <section class="grid md:grid-cols-2 gap-4 mb-6">
          <div class="card p-6">
            <div class="text-sm text-slate-500">Lead trovati</div>
            <div class="text-4xl font-semibold mt-2">${kpi.total_leads}</div>
          </div>
          <div class="card p-6">
            <div class="text-sm text-slate-500">Lead salvati</div>
            <div class="text-4xl font-semibold mt-2">${kpi.total_leads}</div>
          </div>
        </section>

        <section class="card p-6 mb-6">
          <h3 class="text-lg font-semibold mb-4">Inizia una nuova ricerca</h3>
          <a href="/app/search" class="btn btn-primary inline-flex text-base px-8 py-3">Avvia nuova ricerca</a>
        </section>

        <section class="card p-6">
          <h3 class="text-lg font-semibold mb-4">Ultime attività</h3>
          <div class="space-y-3">
            ${(kpi.recent_activity||[]).slice(0,6).map(a=>`
              <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                <span class="text-slate-700">${a.type}</span>
                <span class="text-slate-500 text-sm">${a.value}</span>
              </div>
            `).join("") || '<p class="text-slate-500">Nessuna attività recente.</p>'}
          </div>
        </section>`;
      document.getElementById('app').innerHTML = appLayout('dashboard', html);
    } catch (e) {
      clearSession(); navTo('/app/login');
    }
  })();
</script>
</html>
