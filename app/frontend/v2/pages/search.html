<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ricerca Premium</title>
  <link rel="stylesheet" href="/static/premium.css" />
  <script src="/static/premium.js"></script>
</head>
<body>
<div class="shell" id="app"></div>
<script>
  if (!requireAuthPremium()) {}
  const PremiumUI = { isPremiumUser: false };
  const app = document.getElementById("app");
  app.innerHTML = `
    ${topbar("search")}
    <main class="wrap" style="padding-bottom:42px;">
      <section class="hero" style="margin-top:22px;">
        <img src="/static/images/jet-cabin.png" alt="Jet cabin" />
        <div class="hero-content">
          <div>
            <h1>Trova aziende strategiche</h1>
            <p>Ricerca intelligente in un flusso semplice, pulito e immediato.</p>
          </div>
        </div>
      </section>

      <section class="search-shell">
        <div class="search-box">
          <form id="f">
            <input id="q" class="input" placeholder="Cerca aziende ad alto valore..." required />
            <div class="filters">
              <label class="input" style="display:flex;flex-direction:column;gap:6px;padding:10px 12px;">
                <span style="font-size:12px;color:#8fa3bf;">Lingua / Language</span>
                <select id="searchLang" class="input" style="border:none;padding:0;background:transparent;">
                  <option value="en" selected>English</option>
                  <option value="it">Italiano</option>
                  <option value="fr">Français</option>
                  <option value="de">Deutsch</option>
                  <option value="es">Español</option>
                </select>
              </label>
              <input id="country" class="input" placeholder="Paese" />
              <input id="sector" class="input" placeholder="Settore" />
              <input id="limit" class="input" type="number" min="1" max="50" value="10" />
            </div>
            <div style="margin-top:10px;">
              <label style="display:inline-flex;align-items:center;gap:8px;color:#c8d2e2;font-size:14px;">
                <input id="premiumMode" type="checkbox" />
                Ricerca Premium
              </label>
              <button id="upgradeBtn" type="button" class="btn btn-secondary" style="margin-left:10px;display:none;">Passa a Premium</button>
            </div>
            <div style="margin-top:12px;">
              <button class="btn btn-primary" style="min-width:160px;">Cerca</button>
            </div>
          </form>
          <p id="status" class="muted" style="margin:12px 2px 0;">Inserisci la tua ricerca per iniziare.</p>
        </div>
      </section>

      <section id="results" class="cards"></section>
    </main>`;

  async function setupPremiumAccess() {
    try {
      const me = await apiPremium("/auth/me");
      const isPremiumUser = (me.plan || "free").toLowerCase() === "premium";
      PremiumUI.isPremiumUser = isPremiumUser;
      const premiumToggle = document.getElementById("premiumMode");
      const upgradeBtn = document.getElementById("upgradeBtn");
      if (!isPremiumUser) {
        premiumToggle.disabled = true;
        premiumToggle.checked = false;
        upgradeBtn.style.display = "inline-flex";
      } else {
        premiumToggle.disabled = false;
      }
      upgradeBtn.addEventListener("click", () => {
        const status = document.getElementById("status");
        status.textContent = "Passa a Premium per attivare la ricerca qualificata.";
      });
    } catch {
      PremiumUI.isPremiumUser = false;
      const premiumToggle = document.getElementById("premiumMode");
      premiumToggle.disabled = true;
      premiumToggle.checked = false;
    }
  }
  setupPremiumAccess();

  document.getElementById("f").addEventListener("submit", async (e) => {
    e.preventDefault();
    const status = document.getElementById("status");
    const results = document.getElementById("results");
    const isPremium = document.getElementById("premiumMode").checked;
    status.textContent = "Stiamo analizzando aziende...";
    results.innerHTML = "";
    try {
      const data = await apiPremium(`/api/v1/company-search?mode=${isPremium ? "premium" : "normal"}`, {
        method: "POST",
        body: JSON.stringify({
          query: document.getElementById("q").value,
          country: document.getElementById("country").value,
          sector: document.getElementById("sector").value,
          limit: Number(document.getElementById("limit").value || 10),
          language: document.getElementById("searchLang").value,
        }),
      });
      const rows = data.results || [];
      if (!rows.length) {
        status.textContent = data.message || "Abbiamo trovato 0 aziende";
        results.innerHTML = `<div class="panel muted">${data.message || "Nessun risultato disponibile. Prova una ricerca diversa."}</div>`;
        return;
      }

      status.textContent = `Abbiamo trovato ${rows.length} aziende`;

      const confBand = (c) => (c >= 70 ? "HIGH VALUE" : c >= 40 ? "MEDIUM" : "LOW");

      const visibleCards = rows.map((r, idx) => {
        const conf = Number(r.confidence_score || 0);
        const band = confBand(conf);
        const contacts = [r.email, r.phone].filter(Boolean).join(" · ") || "Contatti non pubblici";
        const site = r.website || r.source_url || "";
        return `
        <article class="company-card">
          <div class="company-head">
            <div>
              <div class="company-name">${r.company_name || "Azienda"}</div>
              <div class="meta">${r.country || "-"} · ${r.sector || "settore n/d"} · Confidence ${conf}</div>
            </div>
            <span class="badge ${classBadge(band)}">${band}</span>
          </div>
          <div class="meta" style="margin-top:8px;">${contacts}</div>
          <div class="meta" style="margin-top:4px;">Revenue: ${r.revenue || "not found"} · Stato: ${r.validation_status || "verified"}</div>
          ${site ? `<div class="meta" style="margin-top:4px;"><a href="${site}" target="_blank" rel="noopener">${site}</a></div>` : ""}
          <div style="margin-top:14px;">
            <button class="btn btn-secondary save-btn" data-i="${idx}">Salva lead</button>
          </div>
        </article>`;
      }).join("");

      results.innerHTML = visibleCards;

      document.querySelectorAll(".save-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          btn.textContent = "Lead salvato";
          btn.disabled = true;
        });
      });
    } catch (err) {
      status.textContent = err.message || "Ricerca non disponibile al momento.";
      results.innerHTML = `<div class="panel muted">Si è verificato un errore.</div>`;
    }
  });
</script>
</body>
</html>
